name: Node CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-unit-results
          path: coverage/
          retention-days: 7

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: snaphub
          POSTGRES_PASSWORD: snaphub_ci
          POSTGRES_DB: snapshotdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Apply database schema
        run: psql postgresql://snaphub:snaphub_ci@localhost:5432/snapshotdb -f src/helpers/database/schema_pg.sql

      - name: Start snapshot-hub server
        run: npm start &
        env:
          DATABASE_URL: postgresql://snaphub:snaphub_ci@localhost:5432/snapshotdb
          PORT: 3700
          # Hardhat test key #0 — never use on mainnet
          RELAYER_PK: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3700/api && break
            echo "Waiting for server... attempt $i"
            sleep 3
          done

      - name: Run integration tests
        run: npm run test:integration
        env:
          INTEGRATION: "1"
          SNAPSHOT_HUB_URL: http://localhost:3700
          DATABASE_URL: postgresql://snaphub:snaphub_ci@localhost:5432/snapshotdb

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-integration-results
          path: coverage/
          retention-days: 7
